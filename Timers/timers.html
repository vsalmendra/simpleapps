<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timers — Stopwatch & Countdown</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #000000;
            --panel: #0a0a0a;
            --panel-border: #262626;
            --text: #e5e5e5;
            --muted: #737373;
            --neutral: #d4d4d4;
            --yellow: #facc15;
            --red: #ef4444;
            --green: #22c55e;
            --button: #262626;
            --button-hover: #404040;
            --button-border: #404040;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
        }

        @keyframes blink {
            50% { opacity: 0.25; }
        }

        .page {
            min-height: 100%;
            display: flex;
            justify-content: center;
            padding: 24px 16px;
        }

        .layout {
            width: min(100%, 640px);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .panel {
            min-height: calc(50vh - 36px);
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.28);
        }

        .panel-header,
        .panel-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .panel-footer {
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .title {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            color: var(--neutral);
        }

        .hint {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .display-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 0;
        }

        .display {
            margin: 0;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            font-size: clamp(3rem, 10vw, 7rem);
            line-height: 1;
            letter-spacing: -0.06em;
            user-select: none;
            text-shadow: 0 2px 12px rgba(255, 255, 255, 0.05);
        }

        /*noinspection CssUnusedSymbol*/
        .blink {
            animation: blink 1s steps(2, start) infinite;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .time-field {
            width: 64px;
            padding: 10px 8px;
            border-radius: 12px;
            border: 1px solid #1f1f1f;
            background: #111111;
            color: var(--text);
            text-align: center;
            font-size: 1rem;
            outline: none;
        }

        .time-field:focus {
            border-color: #525252;
            box-shadow: 0 0 0 3px rgba(82, 82, 82, 0.25);
        }

        .separator {
            color: #525252;
            font-size: 1.1rem;
        }

        .button {
            appearance: none;
            border: 1px solid var(--button-border);
            background: var(--button);
            color: var(--text);
            border-radius: 14px;
            padding: 10px 16px;
            font: inherit;
            cursor: pointer;
            transition: background-color 120ms ease, border-color 120ms ease, transform 120ms ease;
        }

        .button:hover:not(:disabled) {
            background: var(--button-hover);
        }

        .button:active:not(:disabled) {
            transform: translateY(1px);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-green {
            background: #166534;
            border-color: #14532d;
            color: #f5f5f5;
        }

        .button-green:hover:not(:disabled) {
            background: #15803d;
        }

        /*noinspection CssUnusedSymbol*/
        .button-red {
            background: #b91c1c;
            border-color: #991b1b;
            color: #f5f5f5;
        }

        /*noinspection CssUnusedSymbol*/
        .button-red:hover:not(:disabled) {
            background: #dc2626;
        }

        .indicator-wrap {
            position: fixed;
            left: 0;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        .indicator {
            width: 18px;
            height: 18px;
            border-radius: 9999px;
            background: var(--green);
            border: 2px solid #222222;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 720px) {
            .panel {
                min-height: auto;
                padding: 20px 16px;
            }

            .panel-header {
                flex-direction: column;
                align-items: stretch;
            }

            .controls-row {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <main class="layout">
            <section class="panel" aria-labelledby="countdown-title">
                <header class="panel-header">
                    <h1 class="title" id="countdown-title">Countdown</h1>
                    <div class="controls-row">
                        <input id="cd-hours" class="time-field" aria-label="Hours" inputmode="numeric" value="0" />
                        <span class="separator">:</span>
                        <input id="cd-minutes" class="time-field" aria-label="Minutes" inputmode="numeric" value="1" />
                        <span class="separator">:</span>
                        <input id="cd-seconds" class="time-field" aria-label="Seconds" inputmode="numeric" value="0" />
                        <button id="cd-set" class="button">Set</button>
                    </div>
                </header>

                <div class="display-wrap">
                    <p id="countdown-display" class="display">00:01:00</p>
                </div>

                <footer class="panel-footer">
                    <button id="cd-start-stop" class="button button-green">Start</button>
                    <button id="cd-reset" class="button">Reset</button>
                </footer>
            </section>

            <section class="panel" aria-labelledby="stopwatch-title">
                <header class="panel-header">
                    <h2 class="title" id="stopwatch-title">Stopwatch</h2>
                    <div class="hint">mm:ss</div>
                </header>

                <div class="display-wrap">
                    <p id="stopwatch-display" class="display">00:00</p>
                </div>

                <footer class="panel-footer">
                    <button id="sw-start-stop" class="button button-green">Start</button>
                    <button id="sw-restart" class="button">Restart</button>
                    <button id="sw-reset" class="button">Reset</button>
                </footer>
            </section>
        </main>
    </div>

    <div class="indicator-wrap" aria-hidden="true">
        <span id="connectivity-indicator" class="indicator" title="Browser is online"></span>
    </div>

    <script>
        const COLORS = {
            neutral: '#d4d4d4',
            yellow: '#facc15',
            red: '#ef4444',
            green: '#22c55e',
        };

        const hexToRgb = (hex) => {
            const normalized = hex.replace('#', '');
            const expanded = normalized.length === 3
                ? normalized.split('').map((char) => char + char).join('')
                : normalized;
            const value = Number.parseInt(expanded, 16);
            return {
                r: (value >> 16) & 255,
                g: (value >> 8) & 255,
                b: value & 255,
            };
        };

        const rgbToHex = ({ r, g, b }) => `#${[r, g, b].map((item) => item.toString(16).padStart(2, '0')).join('')}`;
        const lerp = (start, end, amount) => start + (end - start) * amount;

        const lerpColor = (startHex, endHex, amount) => {
            const start = hexToRgb(startHex);
            const end = hexToRgb(endHex);
            return rgbToHex({
                r: Math.round(lerp(start.r, end.r, amount)),
                g: Math.round(lerp(start.g, end.g, amount)),
                b: Math.round(lerp(start.b, end.b, amount)),
            });
        };

        const pad2 = (value) => String(value).padStart(2, '0');

        const formatMMSS = (milliseconds) => {
            const totalSeconds = Math.floor(milliseconds / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${pad2(minutes)}:${pad2(seconds)}`;
        };

        const formatHHMMSS = (milliseconds) => {
            const totalSeconds = Math.floor(milliseconds / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            return `${pad2(hours)}:${pad2(minutes)}:${pad2(seconds)}`;
        };

        const sanitizeNumericInput = (event) => {
            event.target.value = event.target.value.replace(/\D/g, '');
        };

        const computeCountdownMs = (hours, minutes, seconds) => {
            const hh = Math.max(0, Number.parseInt(hours || '0', 10) || 0);
            const mm = Math.max(0, Number.parseInt(minutes || '0', 10) || 0);
            const ss = Math.max(0, Number.parseInt(seconds || '0', 10) || 0);
            return (hh * 3600 + mm * 60 + ss) * 1000;
        };

        const elements = {
            cdHours: document.getElementById('cd-hours'),
            cdMinutes: document.getElementById('cd-minutes'),
            cdSeconds: document.getElementById('cd-seconds'),
            cdSet: document.getElementById('cd-set'),
            cdStartStop: document.getElementById('cd-start-stop'),
            cdReset: document.getElementById('cd-reset'),
            cdDisplay: document.getElementById('countdown-display'),
            swStartStop: document.getElementById('sw-start-stop'),
            swRestart: document.getElementById('sw-restart'),
            swReset: document.getElementById('sw-reset'),
            swDisplay: document.getElementById('stopwatch-display'),
            indicator: document.getElementById('connectivity-indicator'),
        };

        const stopwatch = {
            running: false,
            elapsed: 0,
            startedAt: 0,
            frameId: 0,
            thresholdStartMs: 10 * 60 * 1000,
            thresholdEndMs: 15 * 60 * 1000,
        };

        const countdown = {
            running: false,
            expired: false,
            initialMs: 60_000,
            remainingMs: 60_000,
            startedAt: 0,
            frameId: 0,
        };

        function setButtonVariant(button, variant) {
            button.classList.remove('button-green', 'button-red');
            if (variant) {
                button.classList.add(variant);
            }
        }

        function renderStopwatch() {
            let color = COLORS.neutral;
            if (stopwatch.elapsed >= stopwatch.thresholdEndMs) {
                color = COLORS.red;
            } else if (stopwatch.elapsed > stopwatch.thresholdStartMs) {
                const progress = Math.min(1, (stopwatch.elapsed - stopwatch.thresholdStartMs) / (stopwatch.thresholdEndMs - stopwatch.thresholdStartMs));
                color = lerpColor(COLORS.neutral, COLORS.yellow, progress);
            }

            elements.swDisplay.textContent = formatMMSS(stopwatch.elapsed);
            elements.swDisplay.style.color = color;
            elements.swStartStop.textContent = stopwatch.running ? 'Stop' : 'Start';
            setButtonVariant(elements.swStartStop, stopwatch.running ? 'button-red' : 'button-green');
        }

        function renderCountdown() {
            let color = COLORS.neutral;
            if (countdown.initialMs > 0) {
                const threshold = countdown.initialMs * 0.2;
                if (countdown.remainingMs < threshold) {
                    const progress = 1 - Math.max(0, countdown.remainingMs) / threshold;
                    color = lerpColor(COLORS.neutral, COLORS.yellow, progress);
                }
            }

            elements.cdDisplay.textContent = formatHHMMSS(countdown.remainingMs);
            elements.cdDisplay.style.color = color;
            elements.cdDisplay.classList.toggle('blink', countdown.expired);
            elements.cdSet.disabled = countdown.running;
            elements.cdStartStop.textContent = countdown.running ? 'Stop' : 'Start';
            setButtonVariant(elements.cdStartStop, countdown.running ? 'button-red' : 'button-green');
        }

        function updateIndicator() {
            const online = navigator.onLine;
            elements.indicator.style.background = online ? COLORS.green : COLORS.red;
            elements.indicator.title = online ? 'Browser is online' : 'Browser is offline';
        }

        function tickStopwatch() {
            if (!stopwatch.running) {
                return;
            }

            stopwatch.elapsed = Date.now() - stopwatch.startedAt;
            renderStopwatch();
            stopwatch.frameId = window.requestAnimationFrame(tickStopwatch);
        }

        function startStopwatch() {
            if (stopwatch.running) {
                return;
            }

            stopwatch.running = true;
            stopwatch.startedAt = Date.now() - stopwatch.elapsed;
            renderStopwatch();
            stopwatch.frameId = window.requestAnimationFrame(tickStopwatch);
        }

        function stopStopwatch() {
            stopwatch.running = false;
            window.cancelAnimationFrame(stopwatch.frameId);
            renderStopwatch();
        }

        function resetStopwatch() {
            stopwatch.running = false;
            stopwatch.elapsed = 0;
            window.cancelAnimationFrame(stopwatch.frameId);
            renderStopwatch();
        }

        function restartStopwatch() {
            stopwatch.elapsed = 0;
            stopwatch.startedAt = Date.now();
            if (!stopwatch.running) {
                stopwatch.running = true;
                stopwatch.frameId = window.requestAnimationFrame(tickStopwatch);
            }
            renderStopwatch();
        }

        function tickCountdown() {
            if (!countdown.running) {
                return;
            }

            const elapsed = Date.now() - countdown.startedAt;
            countdown.remainingMs = Math.max(0, countdown.initialMs - elapsed);

            if (countdown.remainingMs <= 0) {
                countdown.running = false;
                countdown.expired = true;
                window.cancelAnimationFrame(countdown.frameId);
                renderCountdown();
                return;
            }

            renderCountdown();
            countdown.frameId = window.requestAnimationFrame(tickCountdown);
        }

        function setCountdownValue() {
            const nextMs = computeCountdownMs(elements.cdHours.value, elements.cdMinutes.value, elements.cdSeconds.value);
            countdown.initialMs = nextMs;
            countdown.remainingMs = nextMs;
            countdown.expired = nextMs === 0;
            renderCountdown();
        }

        function startCountdown() {
            if (countdown.running) {
                return;
            }

            if (countdown.remainingMs <= 0) {
                countdown.remainingMs = countdown.initialMs;
                countdown.expired = false;
            }

            countdown.running = true;
            countdown.startedAt = Date.now() - (countdown.initialMs - countdown.remainingMs);
            renderCountdown();
            countdown.frameId = window.requestAnimationFrame(tickCountdown);
        }

        function stopCountdown() {
            countdown.running = false;
            window.cancelAnimationFrame(countdown.frameId);
            renderCountdown();
        }

        function resetCountdown() {
            countdown.running = false;
            countdown.remainingMs = countdown.initialMs;
            countdown.expired = countdown.initialMs === 0;
            window.cancelAnimationFrame(countdown.frameId);
            renderCountdown();
        }

        [elements.cdHours, elements.cdMinutes, elements.cdSeconds].forEach((input) => {
            input.addEventListener('input', sanitizeNumericInput);
        });

        elements.cdSet.addEventListener('click', setCountdownValue);
        elements.cdStartStop.addEventListener('click', () => {
            if (countdown.running) {
                stopCountdown();
            } else {
                startCountdown();
            }
        });
        elements.cdReset.addEventListener('click', resetCountdown);

        elements.swStartStop.addEventListener('click', () => {
            if (stopwatch.running) {
                stopStopwatch();
            } else {
                startStopwatch();
            }
        });
        elements.swRestart.addEventListener('click', restartStopwatch);
        elements.swReset.addEventListener('click', resetStopwatch);

        window.addEventListener('online', updateIndicator);
        window.addEventListener('offline', updateIndicator);
        window.addEventListener('beforeunload', () => {
            window.cancelAnimationFrame(stopwatch.frameId);
            window.cancelAnimationFrame(countdown.frameId);
        });

        renderCountdown();
        renderStopwatch();
        updateIndicator();
    </script>
</body>
</html>
