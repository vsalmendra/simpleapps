<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Trabajando con extractos Revolut</title>

    <!-- React (UMD) + Babel for single-file JSX -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root{
            --bg:#0b1020;
            --card:#121a33;
            --card2:#0f1730;
            --text:#e8ecff;
            --muted:#a9b2da;
            --border:#2a3563;
            --accent:#7aa2ff;
            --ok:#41d18a;
            --warn:#ffd166;
            --bad:#ff6b6b;
            --shadow: 0 10px 30px rgba(0,0,0,.35);
            --radius:16px;
            --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
        }
        *{box-sizing:border-box}
        body{
            margin:0;
            font-family:var(--sans);
            background: radial-gradient(1200px 600px at 20% 10%, rgba(122,162,255,.25), transparent 60%),
            radial-gradient(800px 500px at 80% 0%, rgba(65,209,138,.18), transparent 55%),
            var(--bg);
            color:var(--text);
            line-height:1.45;
        }
        a{color:var(--accent); text-decoration:none}
        a:hover{text-decoration:underline}
        .wrap{
            max-width: 980px;
            margin: 0 auto;
            padding: 24px 16px 80px;
        }
        header{
            padding: 12px 0 18px;
        }
        h1{
            margin:0 0 6px;
            font-size: 28px;
            letter-spacing: .2px;
        }
        .subtitle{
            margin:0;
            color:var(--muted);
            max-width: 80ch;
        }
        .card{
            background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            margin-top: 14px;
        }
        .card h2{
            margin: 0 0 10px;
            font-size: 18px;
        }
        .stepTitle{
            display:flex;
            align-items:baseline;
            gap:10px;
            margin: 0 0 10px;
        }
        .badge{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            min-width: 34px;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(122,162,255,.16);
            border: 1px solid rgba(122,162,255,.35);
            color: var(--text);
            font-weight: 700;
            font-size: 12px;
        }
        .stepText{
            color: var(--text);
            margin: 0 0 10px;
            max-width: 90ch;
        }
        ul{
            margin: 10px 0 0 20px;
            color: var(--muted);
        }
        li{margin: 6px 0}
        .muted{color:var(--muted)}
        .row{
            display:block; /* forced vertical flow */
            width:100%;
            margin-top: 10px;
        }
        label{
            display:block;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text);
        }
        textarea{
            width:100%;
            min-height: 160px;
            resize: vertical;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,.18);
            color: var(--text);
            padding: 10px 12px;
            font-family: var(--mono);
            font-size: 12.5px;
            outline: none;
        }
        textarea:focus{
            border-color: rgba(122,162,255,.7);
            box-shadow: 0 0 0 3px rgba(122,162,255,.18);
        }
        input[type="file"]{
            width:100%;
            padding: 10px 0;
            color: var(--muted);
        }
        .btn{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,.06);
            color: var(--text);
            font-weight: 800;
            cursor: pointer;
            user-select:none;
            transition: transform .04s ease, background .15s ease, border-color .15s ease;
            text-align:center;
            margin-top: 10px;
        }
        .btn:hover{
            background: rgba(255,255,255,.10);
            border-color: rgba(122,162,255,.55);
        }
        .btn:active{
            transform: translateY(1px) scale(.99);
            background: rgba(122,162,255,.20);
            border-color: rgba(122,162,255,.85);
        }
        .btn[disabled]{
            opacity: .5;
            cursor: not-allowed;
        }
        .btn.primary{
            background: rgba(122,162,255,.16);
            border-color: rgba(122,162,255,.45);
        }
        .btn.primary:hover{
            background: rgba(122,162,255,.22);
            border-color: rgba(122,162,255,.70);
        }
        .btn.good{
            background: rgba(65,209,138,.14);
            border-color: rgba(65,209,138,.45);
        }
        .btn.good:hover{
            background: rgba(65,209,138,.20);
            border-color: rgba(65,209,138,.70);
        }
        .btn.small{
            padding: 8px 12px;
            border-radius: 10px;
            font-weight: 800;
        }
        .hint{
            margin-top: 8px;
            color: var(--muted);
            font-size: 13px;
        }
        .status{
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,.16);
            color: var(--muted);
            font-size: 13px;
        }
        .status.ok{
            border-color: rgba(65,209,138,.5);
            background: rgba(65,209,138,.10);
            color: rgba(228,255,242,.95);
        }
        .status.bad{
            border-color: rgba(255,107,107,.5);
            background: rgba(255,107,107,.10);
            color: rgba(255,235,235,.95);
        }

        table{
            width:100%;
            border-collapse: collapse;
            margin-top: 10px;
            overflow:hidden;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,.14);
        }
        th, td{
            padding: 10px 10px;
            border-bottom: 1px solid rgba(42,53,99,.65);
            vertical-align: top;
            font-size: 13px;
        }
        th{
            text-align:left;
            background: rgba(255,255,255,.06);
            color: var(--text);
            font-weight: 900;
        }
        tr:last-child td{border-bottom:none}
        .mono{font-family: var(--mono)}
        .pill{
            display:inline-flex;
            align-items:center;
            padding: 2px 8px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(255,255,255,.06);
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }
        .spacer{height: 6px}
    </style>
</head>

<body>
<div class="wrap">
    <div id="root"></div>
</div>

<script type="text/babel">
    const { useMemo, useRef, useState } = React;

    // --- CSV parsing with quote support (handles commas and newlines inside quotes) ---
    function parseCSV(text) {
        const rows = [];
        let row = [];
        let field = "";
        let inQuotes = false;

        // Normalize line endings; keep \n (we handle them explicitly)
        const s = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");

        for (let i = 0; i < s.length; i++) {
            const c = s[i];

            if (inQuotes) {
                if (c === '"') {
                    const next = s[i + 1];
                    if (next === '"') { // escaped quote
                        field += '"';
                        i++;
                    } else {
                        inQuotes = false;
                    }
                } else {
                    field += c;
                }
            } else {
                if (c === '"') {
                    inQuotes = true;
                } else if (c === ",") {
                    row.push(field);
                    field = "";
                } else if (c === "\n") {
                    row.push(field);
                    field = "";
                    // Ignore completely empty trailing row (common at EOF)
                    if (row.some(v => String(v).trim() !== "")) rows.push(row);
                    row = [];
                } else {
                    field += c;
                }
            }
        }
        // last field
        row.push(field);
        if (row.some(v => String(v).trim() !== "")) rows.push(row);

        return rows;
    }

    function removeTimePart(value) {
        const s = String(value ?? "").trim();
        if (!s) return "";
        // Common forms: "2025-01-31 12:34:56", "2025-01-31T12:34:56Z"
        // Keep only date part before space or 'T'
        const idxSpace = s.indexOf(" ");
        const idxT = s.indexOf("T");
        const cut = (idxSpace >= 0) ? idxSpace : (idxT >= 0 ? idxT : -1);
        return cut >= 0 ? s.slice(0, cut) : s;
    }

    function toNumberLoose(s) {
        // Assume: dot decimal separator, no thousands separators (per requirement).
        const t = String(s ?? "").trim();
        if (!t) return 0;
        const n = Number(t);
        return Number.isFinite(n) ? n : 0;
    }

    function formatMoneyDot(n) {
        // Dot decimal separator, no thousands separator. Force 2 decimals for consistency.
        const x = Number(n);
        const safe = Number.isFinite(x) ? x : 0;
        const rounded = Math.round(safe * 100) / 100;
        return rounded.toFixed(2); // dot decimal by default
    }

    function isTimestampAfter(a, b) {
        const aStr = String(a ?? "").trim();
        const bStr = String(b ?? "").trim();
        if (!aStr) return false;
        if (!bStr) return true;

        const normA = aStr.includes("T") ? aStr : aStr.replace(" ", "T");
        const normB = bStr.includes("T") ? bStr : bStr.replace(" ", "T");
        const aMs = Date.parse(normA);
        const bMs = Date.parse(normB);

        // Fall back to lexical compare for unexpected timestamp formats.
        if (Number.isFinite(aMs) && Number.isFinite(bMs)) return aMs > bMs;
        return aStr > bStr;
    }


    async function copyToClipboard(text) {
        try {
            await navigator.clipboard.writeText(text);
            return true;
        } catch {
            // Fallback
            try {
                const ta = document.createElement("textarea");
                ta.value = text;
                ta.style.position = "fixed";
                ta.style.left = "-9999px";
                ta.style.top = "0";
                document.body.appendChild(ta);
                ta.focus();
                ta.select();
                const ok = document.execCommand("copy");
                document.body.removeChild(ta);
                return ok;
            } catch {
                return false;
            }
        }
    }

    function App(){
        const [csvText, setCsvText] = useState("");
        const [processed, setProcessed] = useState(null); // { rawRows, filteredRows, saldoFecha, saldoValor, txRows }
        const [status, setStatus] = useState({ type: "info", msg: "Pega el CSV o súbelo, luego pulsa “Procesar”." });

        const [processing, setProcessing] = useState(false);
        const [copiedSaldo, setCopiedSaldo] = useState(false);
        const [copiedTx, setCopiedTx] = useState(false);

        const fileInputRef = useRef(null);

        function onFileChange(e){
            const file = e.target.files && e.target.files[0];
            if (!file) return;

            const name = file.name || "";
            if (!name.toLowerCase().endsWith(".csv")) {
                setStatus({ type: "bad", msg: "El fichero debe tener extensión .csv" });
                e.target.value = "";
                return;
            }

            const reader = new FileReader();
            reader.onload = () => {
                const text = String(reader.result ?? "");
                setCsvText(text);
                setStatus({ type: "ok", msg: "Fichero cargado en el campo “Extracto Revolut”. Pulsa “Procesar”." });
            };
            reader.onerror = () => {
                setStatus({ type: "bad", msg: "No se pudo leer el fichero. Intenta de nuevo." });
            };
            reader.readAsText(file, "utf-8");
        }

        function processNow(){
            setProcessing(true);
            setCopiedSaldo(false);
            setCopiedTx(false);

            try{
                const parsedRows = parseCSV(csvText);

                // First row is always header (language can vary), so always skip it.
                const rows = parsedRows.slice(1);

                if (!rows.length) {
                    setProcessed(null);
                    setStatus({ type: "bad", msg: "No se detectaron filas. ¿Pegaste/súbiste un CSV válido?" });
                    return;
                }

                // Remove any rows where field #4 is empty (1-based)
                const filtered = rows.filter(r => String(r[3] ?? "").trim() !== "");

                if (!filtered.length) {
                    setProcessed(null);
                    setStatus({ type: "bad", msg: "Tras filtrar filas con el campo 4 vacío, no quedan datos." });
                    return;
                }

                // Saldo: for each product, use the latest row by completed timestamp (#4),
                // then sum all those per-product ending balances.
                const latestByProduct = new Map(); // product -> row
                filtered.forEach((r) => {
                    const product = String(r[1] ?? "").trim() || "(sin producto)"; // #2
                    const currentTs = String(r[3] ?? "").trim(); // #4
                    const previous = latestByProduct.get(product);
                    if (!previous || isTimestampAfter(currentTs, previous[3])) {
                        latestByProduct.set(product, r);
                    }
                });

                let latestOverallTs = "";
                let saldoTotal = 0;
                latestByProduct.forEach((row) => {
                    const ts = String(row[3] ?? "").trim();
                    if (isTimestampAfter(ts, latestOverallTs)) latestOverallTs = ts;
                    saldoTotal += toNumberLoose(row[row.length - 1] ?? "0"); // last field = Balance
                });

                const saldoFecha = removeTimePart(latestOverallTs);
                const saldoValor = formatMoneyDot(saldoTotal);

                // Transactions transformations:
                // 0. remove rows where field #4 is empty -> already done (filtered)
                // 1. Remove fields #1,2,3,8,9,10
                // We'll operate on original indices:
                // original #4 -> Fecha
                // original #5 -> DatosBanco
                // original #6, #7 -> amount components => Importe = #6 - #7
                const txRows = filtered.map(r => {
                    const fecha = removeTimePart(r[3] ?? "");          // #4
                    const datosBanco = String(r[4] ?? "");             // #5
                    const v6 = toNumberLoose(r[5] ?? "0");             // #6
                    const v7 = toNumberLoose(r[6] ?? "0");             // #7
                    const importe = formatMoneyDot(v6 - v7);           // #6 - #7
                    const motivo = "?";
                    return { Fecha: fecha, Importe: importe, Motivo: motivo, DatosBanco: datosBanco };
                });

                setProcessed({
                    rawRows: rows,
                    filteredRows: filtered,
                    saldoFecha,
                    saldoValor,
                    txRows
                });

                setStatus({
                    type: "ok",
                    msg: `Procesado OK. Filas leídas: ${rows.length}. Filas válidas (campo 4 no vacío): ${filtered.length}.`
                });
            } catch (err){
                setProcessed(null);
                setStatus({ type: "bad", msg: "Error procesando el CSV. Revisa el formato (comillas, comas, etc.)." });
            } finally {
                setProcessing(false);
            }
        }

        const saldoTSV = useMemo(() => {
            if (!processed) return "";
            return `${processed.saldoFecha}\t${processed.saldoValor}`;
        }, [processed]);

        const txTSV = useMemo(() => {
            if (!processed) return "";
            // Order: Fecha, Importe, Motivo, DatosBanco
            return processed.txRows
                .map(r => `${r.Fecha}\t${r.Importe}\t${r.Motivo}\t${r.DatosBanco}`)
                .join("\n");
        }, [processed]);

        async function onCopySaldo(){
            if (!processed) return;
            const ok = await copyToClipboard(saldoTSV);
            setCopiedSaldo(ok);
            setStatus(ok
                ? { type: "ok", msg: "Saldo copiado (TSV sin cabecera). Vuelve a Google Sheets y pega en A6." }
                : { type: "bad", msg: "No se pudo copiar al portapapeles. Copia manualmente si hace falta." }
            );
            if (ok) setTimeout(() => setCopiedSaldo(false), 1400);
        }

        async function onCopyTx(){
            if (!processed) return;
            const ok = await copyToClipboard(txTSV);
            setCopiedTx(ok);
            setStatus(ok
                ? { type: "ok", msg: "Transacciones copiadas (TSV sin cabecera). Vuelve a Google Sheets y pega en B11." }
                : { type: "bad", msg: "No se pudo copiar al portapapeles. Copia manualmente si hace falta." }
            );
            if (ok) setTimeout(() => setCopiedTx(false), 1400);
        }

        return (
            <div>
                <header>
                    <h1>Trabajando con extractos Revolut</h1>
                    <p className="subtitle">
                        Introducción: este app guía en el proceso de bajar y trabajar un extracto de una cuenta Revolut.
                        Si tienes cuentas en várias monedas, repetir el proceso para cada moneda.
                        Se recomienda cerrar todas las ventanas para no perderse.
                    </p>
                </header>

                <section className="card">
                    <div className="stepTitle">
                        <span className="badge">Paso</span>
                        <h2>1) Abre el fichero Google Sheets con el resumen económico</h2>
                    </div>
                    <p className="stepText">
                        Si no lo encuentras fácilmente, busca en Google Drive en <span className="pill">“ficheros compartidos”</span>.
                        Puedes buscar por las palabras <span className="pill">“resumen personal”</span>.
                        Cuidado para no utilizar versiones viejas.
                    </p>
                </section>

                <section className="card">
                    <div className="stepTitle">
                        <span className="badge">Paso</span>
                        <h2>2) Seleccione la hoja “Entrada de datos”</h2>
                    </div>
                    <p className="stepText muted">Sigue en el mismo Google Sheets.</p>
                </section>

                <section className="card">
                    <div className="stepTitle">
                        <span className="badge">Paso</span>
                        <h2>3) Elija la cuenta correcta (celda B1)</h2>
                    </div>
                    <p className="stepText muted">Asegúrate de estar en la cuenta/moneda correcta antes de pegar datos.</p>
                </section>

                <section className="card">
                    <div className="stepTitle">
                        <span className="badge">Paso</span>
                        <h2>4) Baja el extracto Revolut en formato Excel (CSV) para el período de interés</h2>
                    </div>
                    <p className="stepText">
                        Ir a <a href="https://www.revolut.com/" target="_blank" rel="noreferrer">https://www.revolut.com/</a> y exportar el período.
                    </p>
                    <ul>
                        <li>Sólo incluir meses que ya han terminado.</li>
                        <li>Atención: aunque diga “Excel”, el fichero tiene terminación CSV.</li>
                        <li>Utiliza para esto el website (el app no deja enviar ficheros CSV por email).</li>
                        <li>NO abrir el fichero en Excel, salvo que instruido por Vinicius.</li>
                    </ul>
                </section>

                <section className="card">
                    <div className="stepTitle">
                        <span className="badge">Paso</span>
                        <h2>5) Subir o pegar el extracto Revolut y procesarlo</h2>
                    </div>

                    <div className="row">
                        <label>Extracto Revolut</label>
                        <p className="hint">
                            Puedes pegar el CSV aquí, o subir un fichero <span className="pill">.csv</span>.
                            El contenido se lee como <span className="pill">UTF-8</span> y se coloca en el campo.
                        </p>

                        {/* Upload button above the table (the transformation table comes later) */}
                        <input
                            ref={fileInputRef}
                            type="file"
                            accept=".csv,text/csv"
                            onChange={onFileChange}
                            aria-label="Subir extracto CSV"
                        />

                        <textarea
                            value={csvText}
                            onChange={(e)=>setCsvText(e.target.value)}
                            placeholder={'Pega aquí el CSV de Revolut...'}
                        />

                        <button
                            className={"btn primary"}
                            onClick={processNow}
                            disabled={processing || !csvText.trim()}
                            aria-label="Procesar extracto"
                        >
                            {processing ? "Procesando..." : "Procesar"}
                        </button>

                        <div className={"status " + (status.type === "ok" ? "ok" : status.type === "bad" ? "bad" : "")}>
                            {status.msg}
                        </div>
                    </div>
                </section>

                <section className="card">
                    <div className="stepTitle">
                        <span className="badge">Paso</span>
                        <h2>6) Copiar saldo y pegar en el resumen (A6)</h2>
                    </div>
                    <p className="stepText">
                        Aprieta el botón <span className="pill">“Copiar saldo”</span>, vuelve al resumen,
                        selecciona la celda <span className="pill">A6</span> y utilice el comando <span className="pill">“Pegar”</span>.
                    </p>

                    <table>
                        <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Saldo</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td className="mono">{processed ? processed.saldoFecha : ""}</td>
                            <td className="mono">{processed ? processed.saldoValor : ""}</td>
                        </tr>
                        </tbody>
                    </table>

                    <button
                        className={"btn good"}
                        onClick={onCopySaldo}
                        disabled={!processed}
                        aria-label="Copiar saldo"
                    >
                        {copiedSaldo ? "✅ Copiado" : "Copiar saldo"}
                    </button>

                    <div className="hint">
                        Se copia en TSV (sin cabecera): <span className="mono">{processed ? saldoTSV : ""}</span>
                    </div>
                </section>

                <section className="card">
                    <div className="stepTitle">
                        <span className="badge">Paso</span>
                        <h2>7) Copiar transacciones y pegar en el resumen (B11)</h2>
                    </div>
                    <p className="stepText">
                        Aprieta el botón <span className="pill">“Copiar transacciones”</span> abajo, vuelve al resumen,
                        seleccione la celda <span className="pill">B11</span> y utilice el comando <span className="pill">“Pegar”</span>.
                    </p>

                    <button
                        className={"btn small good"}
                        onClick={onCopyTx}
                        disabled={!processed || !processed?.txRows?.length}
                        aria-label="Copiar transacciones"
                    >
                        {copiedTx ? "✅ Copiado" : "Copiar transacciones"}
                    </button>

                    <table>
                        <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Importe</th>
                            <th>Motivo</th>
                            <th>DatosBanco</th>
                        </tr>
                        </thead>
                        <tbody>
                        {(processed?.txRows ?? []).slice(0, 500).map((r, idx) => (
                            <tr key={idx}>
                                <td className="mono">{r.Fecha}</td>
                                <td className="mono">{r.Importe}</td>
                                <td className="mono">{r.Motivo}</td>
                                <td className="mono">{r.DatosBanco}</td>
                            </tr>
                        ))}
                        {processed?.txRows?.length > 500 && (
                            <tr>
                                <td colSpan="4" className="muted">
                                    Mostrando 500 de {processed.txRows.length} filas (al copiar se incluyen todas).
                                </td>
                            </tr>
                        )}
                        </tbody>
                    </table>

                    <div className="hint">
                        Se copia como TSV sin cabecera, en el orden: <span className="pill">Fecha</span>, <span className="pill">Importe</span>,
                        <span className="pill">Motivo</span>, <span className="pill">DatosBanco</span>.
                    </div>
                </section>

                <section className="card">
                    <div className="stepTitle">
                        <span className="badge">Paso</span>
                        <h2>8) Aplicar reglas (en el otro app)</h2>
                    </div>
                    <p className="stepText muted">
                        Pulsa botón “Aplicar reglas”, para categorizar automáticamente transacciones para las que ya tienes reglas.
                        (Este botón está en otro app.)
                    </p>
                </section>

                <section className="card">
                    <div className="stepTitle">
                        <span className="badge">Paso</span>
                        <h2>9) Rellenar “Categoría” y “motivo”</h2>
                    </div>
                    <p className="stepText">
                        En caso de duda, pon <span className="pill">“?”</span> en el motivo.
                        Transferencias entre cuentas (incluso cambios Revolut) deben estar en la categoría <span className="pill">“01”</span>.
                    </p>
                </section>

                <section className="card">
                    <div className="stepTitle">
                        <span className="badge">Paso</span>
                        <h2>10) Verifica checks (columna I) e incorpora datos</h2>
                    </div>
                    <p className="stepText">
                        Comprueba que todas las verificaciones hayan sido hechas con éxito (columna I) y pulsa <span className="pill">“Incorporar datos”</span>.
                    </p>
                </section>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
</script>
</body>
</html>
